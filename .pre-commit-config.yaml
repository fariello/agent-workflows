# Cited external research artifacts under .agents/docs/research/ are kept VERBATIM (their own
# formatting/punctuation is intentional). Content-MUTATING hooks (whitespace/eof fixers, ruff
# lint+format) are excluded for that path so they never rewrite as-delivered artifacts. SAFETY
# hooks (gitleaks, large-file check) still apply everywhere, including research, so secrets or
# oversized blobs cannot slip in via a research directory.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '^\.agents/docs/research/'
      - id: end-of-file-fixer
        exclude: '^\.agents/docs/research/'
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        exclude: '^\.agents/docs/research/'
      - id: ruff-format
        exclude: '^\.agents/docs/research/'

  # Local guard (D92/D93): no local leaks (identifying info) in TRACKED files. Scans the whole
  # tracked tree (not just staged files) via the packaged agent_workflows.local_leaks engine,
  # so it cannot be bypassed by staging a subset; runs once per commit.
  - repo: local
    hooks:
      - id: local-leaks
        name: no local leaks in tracked files
        entry: python3 -m agent_workflows check-local-leaks
        language: system
        pass_filenames: false
        always_run: true
