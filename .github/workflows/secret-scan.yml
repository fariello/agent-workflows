name: secret-scan

# Scan for committed secrets/keys on push and PR using gitleaks (a standalone binary
# that installs cleanly in a runner). This enforces, in CI, the prevention that the
# assess-secrets IPD (2026-07-03) proposed. False positives are managed via the
# committed .gitleaksignore baseline at the repo root.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so gitleaks can scan the full commit history, not just HEAD -
          # secrets removed from HEAD but still in history are the dangerous case.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # No org license needed for public/basic use; the action reads .gitleaksignore
          # and any gitleaks.toml at the repo root automatically.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
